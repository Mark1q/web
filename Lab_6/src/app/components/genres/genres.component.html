<h1 class="page-title">Genres</h1>
<p class="page-subtitle">Manage your book categories</p>

<app-alert #alertRef></app-alert>
<app-confirm-dialog #confirmRef></app-confirm-dialog>

<div class="genres-layout">

  <!-- add genre panel -->
  <div class="card">
    <h2 class="panel-title">Add Genre</h2>
    <div class="form-group" style="margin-bottom:1rem">
      <label>Genre Name *</label>
      <input [(ngModel)]="newName" name="newName" placeholder="e.g. Magical Realism"
             (keyup.enter)="addGenre()" [class.ng-invalid]="addError">
      <span *ngIf="addError" class="error-msg">{{ addError }}</span>
    </div>
    <button class="btn btn-primary" style="width:100%" (click)="addGenre()">+ Add Genre</button>
  </div>

  <!--genre list panel -->
  <div>
    <div class="filter-bar" style="margin-bottom:1rem">
      <label>Search</label>
      <div class="search-box" style="flex:1">
        <span class="search-icon">🔍</span>
        <input [(ngModel)]="searchValue" (ngModelChange)="onSearch()" placeholder="Filter genres…">
      </div>
    </div>

    <div *ngIf="loading" class="loading-wrap"><div class="spinner"></div> Loading…</div>

    <div *ngIf="!loading && filtered.length === 0" class="empty-state">
      <div class="empty-icon">🏷️</div><p>No genres yet.</p>
    </div>

    <div *ngIf="!loading && filtered.length > 0" class="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Books</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let g of filtered">
            <td>
              <div style="font-weight:600;font-family:'Playfair Display',serif">{{ g.name }}</div>
            </td>
            <td>
              <span class="genre-tag">{{ g.book_count }} book{{ g.book_count !== 1 ? 's' : '' }}</span>
            </td>
            <td class="td-actions">
              <button class="btn btn-primary btn-sm" (click)="openEdit(g)">✏️ Edit</button>
              <button class="btn btn-danger btn-sm" (click)="deleteGenre(g)">🗑</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- edit modal -->
<div *ngIf="editGenre" class="modal-overlay" (click)="closeEdit()">
  <div class="modal" style="max-width:400px" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">✏️ Edit Genre</span>
      <button class="modal-close" (click)="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Genre Name *</label>
        <input [(ngModel)]="editName" name="editName" (keyup.enter)="saveEdit()" [class.ng-invalid]="editError">
        <span *ngIf="editError" class="error-msg">{{ editError }}</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" (click)="closeEdit()">Cancel</button>
      <button class="btn btn-primary" (click)="saveEdit()">💾 Save</button>
    </div>
  </div>
</div>
